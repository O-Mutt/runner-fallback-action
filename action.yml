name: 'Self-Hosted Runner Fallback'
description: 'Check whether self-hosted GitHub runners are online and not busy, and fall back to a GitHub-hosted runner when they are not.'
author: "Matt O'Keefe (@O-Mutt)"
branding:
  icon: activity
  color: blue
inputs:
  github-token:
    description: 'Token with permission to list runners at the chosen scope: classic PAT with repo for user repos, admin:org for organizations, or manage_runners:enterprise for enterprises. The default GITHUB_TOKEN does not have these scopes.'
    required: true
  primary-runner:
    description: 'Comma-separated list of labels for the primary runner, e.g. self-hosted,linux'
    required: true
  fallback-runner:
    description: 'Name or labels of the fallback runner, e.g. ubuntu-latest'
    required: true
  organization:
    description: "GitHub organization name to check for self-hosted runners (mutually exclusive with enterprise), if not supplied we will use user's personal runners"
    required: false
  enterprise:
    description: "GitHub enterprise name to check for self-hosted runners (mutually exclusive with organization), if not supplied we will use user's personal runners"
    required: false
  primaries-required:
    description: 'Use the fallback runner if there are not at least this many primaries that are not busy'
    required: false
  fallback-on-error:
    description: 'Use the fallback runner if the action has any type of error, for example missing or non-functional github-token'
    required: false
    default: false
outputs:
  use-runner:
    description: 'JSON-encoded array of runner labels to use. Parse with fromJson(...) when assigning to runs-on. Example: ["self-hosted","linux"] or ["ubuntu-latest"].'
runs:
  using: 'node24'
  main: 'dist/index.js'
